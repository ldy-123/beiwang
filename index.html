<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f5f5f5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="随手记">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>随手记</title>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <h1>随手记</h1>
    <div style="position:relative">
      <button class="icon-btn" id="btnUser" aria-label="账户" style="position:relative">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M20 21a8 8 0 10-16 0"/>
        </svg>
        <span class="user-dot" id="userDot" style="display:none"></span>
      </button>
      <div class="user-menu" id="userMenu">
        <div class="user-menu-email" id="userMenuEmail"></div>
        <div class="menu-divider"></div>
        <button class="menu-action" id="btnChangePw">修改密码</button>
        <div class="menu-divider"></div>
        <button class="menu-action" id="btnSignOut">退出登录</button>
      </div>
    </div>
    <button class="icon-btn" id="btnSearch" aria-label="搜索">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button class="icon-btn" id="btnMenu" aria-label="更多">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/>
      </svg>
    </button>
  </div>
  <div class="search-bar" id="searchBar">
    <input type="search" id="searchInput" placeholder="搜索随手记…" autocomplete="off">
  </div>
  <div class="menu-bar" id="menuBar">
    <button class="menu-action" id="btnExport">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      导出随手记
    </button>
    <div class="menu-divider"></div>
    <button class="menu-action" id="btnImportTrigger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      导入随手记
    </button>
    <div class="menu-divider"></div>
    <button class="menu-action" id="btnClipboardImport">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <rect x="8" y="2" width="8" height="4" rx="1"/>
        <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
      </svg>
      从剪贴板导入
    </button>
  </div>
</header>
<input type="file" id="fileImport" accept=".json" style="display:none">

<!-- Tags bar -->
<div class="tags-bar" id="tagsBar"></div>

<!-- Archive sub-tabs -->
<div class="archive-subtabs" id="archiveSubtabs" style="display:none">
  <button class="archive-subtab active" data-archive="memos">备忘</button>
  <button class="archive-subtab" data-archive="notes">小记</button>
  <button class="archive-subtab" data-archive="habits">打卡</button>
</div>

<!-- Memo list -->
<main class="content">
  <div class="memo-list" id="memoList"></div>
</main>

<!-- FAB -->
<button class="fab" id="fab" aria-label="新建备忘">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- Edit Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="modalTitle">新建备忘</h2>
      <button class="icon-btn" id="btnCloseModal" style="color:var(--text-secondary)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div>
      <div class="field-label">标题</div>
      <input class="input-title" id="inputTitle" type="text" placeholder="随手记标题…" maxlength="100">
    </div>

    <div>
      <div class="field-label">描述</div>
      <input class="input-desc" id="inputDesc" type="text" placeholder="备忘内容…" maxlength="100">
    </div>

    <div>
      <div class="field-label">待办清单</div>
      <div class="todo-list" id="todoList"></div>
      <button class="btn-add-todo" id="btnAddTodo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        添加待办
      </button>
    </div>

    <div>
      <div class="field-label">标签</div>
      <div class="tag-selector" id="tagSelector"></div>
      <div class="tag-input-row" style="margin-top:10px">
        <input type="text" id="tagInput" placeholder="新标签名…" maxlength="20">
        <button id="btnAddTag">添加</button>
      </div>
    </div>

    <div>
      <div class="field-label">优先级</div>
      <div class="priority-selector" id="prioritySelector"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-delete" id="btnDelete" style="display:none">删除</button>
      <button class="btn-save" id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- Note Modal -->
<div class="overlay" id="noteOverlay">
  <div class="modal note-full">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <button class="icon-btn" id="btnCloseNoteModal" style="color:var(--text-secondary);margin-left:auto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Unified editor area -->
    <div class="note-editor-unified">
      <input class="note-title-input" id="noteInputTitle" type="text" placeholder="标题" maxlength="100">
      <div class="note-time-sep" id="noteTimeSep"></div>
      <div class="richtext-editor" id="richtextEditor" contenteditable="true" placeholder="记录你想记录的内容…"></div>
    </div>

    <!-- Bottom toolbar -->
    <div class="note-toolbar" id="noteToolbar">
      <button class="rt-btn" data-cmd="bold" type="button" aria-label="加粗">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>
      </button>
      <button class="rt-btn" data-cmd="underline" type="button" aria-label="下划线">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/></svg>
      </button>
      <div class="rt-color-wrap" id="rtColorWrap">
        <button class="rt-btn" id="btnRtColor" type="button" aria-label="文字颜色">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <div class="rt-color-dd" id="rtColorDD">
          <span class="rt-color-dot" style="background:#ef4444" data-color="#ef4444"></span>
          <span class="rt-color-dot" style="background:#f59e0b" data-color="#f59e0b"></span>
          <span class="rt-color-dot" style="background:#10b981" data-color="#10b981"></span>
          <span class="rt-color-dot" style="background:#3b82f6" data-color="#3b82f6"></span>
          <span class="rt-color-dot" style="background:#8b5cf6" data-color="#8b5cf6"></span>
          <span class="rt-color-dot" style="background:#ec4899" data-color="#ec4899"></span>
          <span class="rt-color-dot" style="background:#78716c" data-color="#78716c"></span>
          <span class="rt-color-dot" style="background:#1c1d2e" data-color="#1c1d2e"></span>
        </div>
      </div>
      <span class="rt-sep"></span>
      <button class="rt-btn" id="btnRtImage" type="button" aria-label="插入图片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <input type="file" id="rtImageInput" accept="image/*" style="display:none">
      <span class="rt-sep"></span>
      <button class="note-tags-toggle" id="btnNoteTagsToggle">
        <span id="noteTagsToggleLabel">+ 标签</span>
      </button>
    </div>

    <!-- Tags expandable area -->
    <div class="note-tags-body" id="noteTagsBody" style="display:none">
      <div class="tag-selector" id="noteTagSelector"></div>
      <div class="tag-input-row" style="margin-top:10px">
        <input type="text" id="noteTagInput" placeholder="新标签名…" maxlength="20">
        <button id="btnNoteAddTag">添加</button>
      </div>
      <button class="btn-delete" id="btnDeleteNote" style="display:none;margin-top:10px;width:100%">删除</button>
    </div>

    <div class="modal-actions">
      <button class="btn-save" id="btnSaveNote">保存</button>
    </div>
  </div>
</div>

<!-- Habit Modal -->
<div class="overlay" id="habitOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="habitModalTitle">新建习惯</h2>
      <button class="icon-btn" id="btnCloseHabitModal" style="color:var(--text-secondary)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div>
      <div class="field-label">图标</div>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>
    <div>
      <div class="field-label">习惯名称</div>
      <input class="input-title" id="habitInputTitle" type="text" placeholder="习惯名称…" maxlength="30">
    </div>
    <div>
      <div class="field-label">颜色</div>
      <div class="color-picker" id="habitColorPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btnDeleteHabit" style="display:none">删除</button>
      <button class="btn-save" id="btnSaveHabit">保存</button>
    </div>
  </div>
</div>

<!-- Custom date-time picker -->
<div id="customTimePicker" class="dp-wrap" style="display:none"></div>
<div id="dpBackdrop" style="display:none;position:fixed;inset:0;z-index:499"></div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="memos">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M15 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V7l-5-4zm-1 2v4h4l-4-4zM8 12h8v1.5H8V12zm0 3h8v1.5H8V15zm0-6h4v1.5H8V9z"/>
    </svg>
    <span>备忘</span>
  </button>
  <button class="nav-item" data-tab="notes">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM8 13h8v2H8v-2zm0 4h8v2H8v-2z"/>
    </svg>
    <span>小记</span>
  </button>
  <button class="nav-item" data-tab="habits">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    </svg>
    <span>打卡</span>
  </button>
  <button class="nav-item" data-tab="archive">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M21 3H3v4h18V3zm-2 6H5v10a1 1 0 001 1h12a1 1 0 001-1V9zm-8 3h2v2h-2v-2z"/>
    </svg>
    <span>归档</span>
  </button>
</nav>

<!-- Auth Modal -->
<div class="overlay" id="authOverlay">
  <div class="modal auth-modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="authModalTitle">登录</h2>
      <button class="icon-btn" id="btnCloseAuth" style="color:var(--text-secondary)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div>
      <div class="field-label">邮箱</div>
      <input class="input-title" id="authEmail" type="email" placeholder="your@email.com">
    </div>
    <div>
      <div class="field-label">密码</div>
      <input class="input-title" id="authPassword" type="password" placeholder="至少6位密码">
    </div>
    <div class="auth-error" id="authError" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn-delete" id="btnAuthSwitch" style="display:block;flex:1">去注册</button>
      <button class="btn-save" id="btnAuthSubmit">登录</button>
    </div>
    <button class="auth-link" id="btnForgotPw" style="margin-top:8px">忘记密码</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
